version: 1
frontend:
  phases:
    preBuild:
      commands:
        - env | grep -E "NEXT_PUBLIC_|NEXTAUTH_|QSC_|SENDGRID_" > .env.local
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - .next/cache/**/*
